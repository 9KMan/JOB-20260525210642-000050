# Helm Chart for Temporal
namespace: temporal

server:
  replicas: 2

  service:
    type: ClusterIP

  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  persistence:
    enabled: true
    size: 20Gi
    storageClass: managed-premium

  ui:
    enabled: true
    replicas: 1

cassandra:
  enabled: false

mysql:
  enabled: true
  host: temporal-mysql
  port: 3306
  database: temporal
  user: temporal
  password: temporal

ingress:
  enabled: true
  annotations:
    kubernetes.io/ingress.class: nginx
  hosts:
    - temporal.example.com