# Helm values for Argo Workflows
images:
  workflow controller:
    repository: quay.io/argoproj/argocli
    tag: latest

namespace: argo

controller:
  replicas: 2
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

executor:
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

server:
  replicas: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi
  ingress:
    enabled: true
    annotations:
      kubernetes.io/ingress.class: nginx
    hosts:
      - argocd.example.com

workflow:
  serviceAccount:
    create: true
    name: argo-workflow

persistence:
  enabled: true
  storageClassName: managed-premium
  accessMode: ReadWriteOnce
  size: 20Gi