# Helm Chart for Redis
namespace: redis

master:
  replicas: 1
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

replica:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

sentinel:
  enabled: true
  replicas: 3

service:
  type: ClusterIP

persistence:
  enabled: true
  size: 10Gi
  storageClass: managed-premium