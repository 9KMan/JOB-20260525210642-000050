# Helm Chart for PostgreSQL
namespace: postgresql

primary:
  replicas: 1
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 2000m
      memory: 4Gi

  persistence:
    enabled: true
    size: 50Gi
    storageClass: managed-premium

  service:
    type: ClusterIP

  pgbackrest:
    enabled: true
    retention: 30

readReplicas:
  replicaCount: 2
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

securityContext:
  enabled: true

metrics:
  enabled: true
  serviceMonitor:
    enabled: true