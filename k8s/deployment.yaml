apiVersion: v1
kind: Namespace
metadata:
  name: integration-platform
  labels:
    app.kubernetes.io/name: integration-platform

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: integration-api
  namespace: integration-platform
  labels:
    app: integration-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: integration-api
  template:
    metadata:
      labels:
        app: integration-api
    spec:
      serviceAccountName: integration-api
      containers:
      - name: api
        image: integration-platform:latest
        ports:
        - containerPort: 8080
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: integration-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: integration-secrets
              key: redis-url
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 2Gi
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: integration-api
  namespace: integration-platform
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 8080
  selector:
    app: integration-api

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: integration-api
  namespace: integration-platform
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
spec:
  rules:
  - host: api.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: integration-api
            port:
              number: 80

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: integration-api
  namespace: integration-platform
  labels:
    app: integration-platform

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: integration-api
  namespace: integration-platform
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]
- apiGroups: ["Coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["get", "create", "update"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: integration-api
  namespace: integration-platform
subjects:
- kind: ServiceAccount
  name: integration-api
  namespace: integration-platform
roleRef:
  kind: Role
  name: integration-api
  apiGroup: rbac.authorization.k8s.io